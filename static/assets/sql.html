<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UK_1 Pending Unbans Preview</title>
    <style>
        :root {
            --bg: #0f1115;
            --bg-card: #181b21;
            --border-subtle: #262a33;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #f97316;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 24px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #1f2933, #050609 55%);
            color: var(--text-main);
        }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 4px;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .card {
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            padding: 16px 18px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }

        .summary-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 12px;
        }

        .summary-count {
            font-size: 14px;
            color: var(--text-muted);
        }

        .summary-count strong {
            font-size: 16px;
            color: var(--accent);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 999px;
            border: 1px solid var(--border-subtle);
            background: rgba(15, 23, 42, 0.7);
            color: var(--text-muted);
            white-space: nowrap;
        }

        .tag-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 8px;
        }

        thead {
            background: #111827;
        }

        th, td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid #111827;
        }

        th {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }

        tbody tr:nth-child(even) {
            background: rgba(15, 23, 42, 0.55);
        }

        tbody tr:nth-child(odd) {
            background: rgba(15, 23, 42, 0.35);
        }

        tbody tr:hover {
            background: rgba(55, 65, 81, 0.6);
        }

        .steamid {
            font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 11px;
        }

        .reason {
            max-width: 480px;
            word-break: break-word;
        }

        .expire {
            white-space: nowrap;
            font-size: 11px;
        }

        .perm {
            color: #f87171;
            font-weight: 500;
        }
    </style>
</head>

<script>
    function formatExpire(ts) {
        if (!ts || Number(ts) === 0) {
            return '<span class="perm">perm</span>';
        }

        const unixSeconds = Number(ts);
        if (!Number.isFinite(unixSeconds)) {
            return String(ts);
        }

        const date = new Date(unixSeconds * 1000);

        return `<span class="expire">${date.toLocaleString(undefined, {
            year: "numeric",
            month: "short",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
        })}</span>`;
    }

    function renderTable(rows) {
        const tbody = document.getElementById("resultsBody");
        const totalEl = document.getElementById("totalCount");

        rows.sort((a, b) => (Number(b.old_expire || 0) - Number(a.old_expire || 0)));

        totalEl.textContent = rows.length.toString();
        tbody.innerHTML = "";

        for (const row of rows) {
            const tr = document.createElement("tr");

            const tdSteam = document.createElement("td");
            tdSteam.className = "steamid";
            tdSteam.textContent = row.steamid || "";
            tr.appendChild(tdSteam);

            const tdAdmin = document.createElement("td");
            tdAdmin.textContent = row.admin || "";
            tr.appendChild(tdAdmin);

            const tdReason = document.createElement("td");
            tdReason.className = "reason";
            tdReason.textContent = row.reason || "";
            tr.appendChild(tdReason);

            const tdExpire = document.createElement("td");
            tdExpire.innerHTML = formatExpire(row.old_expire);
            tr.appendChild(tdExpire);

            tbody.appendChild(tr);
        }
    }
